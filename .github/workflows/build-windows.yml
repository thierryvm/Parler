name: "Build Windows"

on:
  workflow_dispatch:
    inputs:
      create-release:
        description: "Create a GitHub release with the built artifacts"
        required: false
        type: boolean
        default: true

jobs:
  build-windows-x64:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-latest-x86_64-pc-windows-msvc

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Install frontend dependencies
        run: bun install

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: "--bundles nsis,msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parler-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  release:
    if: inputs.create-release
    needs: build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: parler-windows-x64
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          APP_VERSION: ${{ steps.get-version.outputs.version }}
        with:
          tag_name: v${{ steps.get-version.outputs.version }}-windows
          name: v${{ steps.get-version.outputs.version }} (Windows)
          body: |
            Windows build of Parler.

            Built from upstream Melvynx/Parler.

            Fork de [Melvynx/Parler](https://github.com/Melvynx/Parler) avec support Windows natif.

            **Installation :** télécharge `Parler_x.x.x_x64-setup.exe` et lance l'installeur.
            Note : Windows SmartScreen peut afficher un avertissement au premier lancement → "Informations complémentaires" → "Exécuter quand même".
          files: artifacts/**/*
          draft: false
          prerelease: false
